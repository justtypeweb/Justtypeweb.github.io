<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JustTypeWeb</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen">

<div class="max-w-xl mx-auto p-4 min-h-screen">

  <h1 class="text-3xl font-bold text-center mb-6">
    JustTypeWeb
  </h1>

  <!-- Username -->
  <input 
    id="username"
    placeholder="Enter your username"
    class="w-full p-3 mb-3 rounded text-black"
  />

  <!-- Post -->
  <textarea 
    id="postInput"
    placeholder="What's happening?"
    class="w-full p-3 rounded text-black h-24"
  ></textarea>

  <button 
    onclick="addPost()"
    class="bg-blue-500 w-full p-3 mt-3 rounded font-bold">
    Post
  </button>

  <!-- 🔍 Search -->
  <input 
    id="searchInput"
    placeholder="Search posts or users..."
    class="w-full p-3 mt-6 rounded text-black"
  />

  <div id="posts" class="mt-6 space-y-2"></div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
