<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JustTypeWeb</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- AdSense -->
  <script async 
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9966062812451377"
    crossorigin="anonymous"></script>
</head>

<body class="bg-black text-white">

<div class="md:flex">

  <!-- 🔥 SIDEBAR (DESKTOP ONLY) -->
  <div class="hidden md:flex w-16 min-h-screen border-r border-gray-800 flex-col items-center py-4 gap-4">
    <button onclick="showHome()" class="p-3 bg-gray-900 rounded-lg">🏠</button>
    <button onclick="showNotifications()" class="p-3 bg-gray-900 rounded-lg">🔔</button>
    <button onclick="showExplore()" class="p-3 bg-gray-900 rounded-lg">🔍</button>
    <button onclick="showAbout()" class="p-3 bg-gray-900 rounded-lg">📄</button>
  </div>

  <!-- 🔥 MAIN CONTENT -->
  <div class="w-full md:max-w-2xl md:mx-auto px-3 pb-32">

    <!-- HEADER -->
    <div class="sticky top-0 bg-black z-50 border-b border-gray-800 py-3 text-center">
      <h1 class="text-blue-400 font-bold text-lg">JustTypeWeb</h1>
    </div>

    <!-- POST BOX -->
    <div class="bg-gray-900 p-4 rounded-xl mt-4">

      <input id="username" placeholder="Username"
        class="w-full p-3 mb-3 bg-black border border-gray-700 rounded-lg">
      <p id="userTagDisplay" class="text-xs text-gray-400 mt-1"></p>

      <textarea id="postInput" placeholder="What's happening?"
        class="w-full p-3 bg-black border border-gray-700 rounded-lg h-24"></textarea>

      <button onclick="addPost()"
        class="bg-blue-500 mt-3 w-full py-3 rounded-lg font-bold">
        Post
      </button>

    </div>

    <!-- SEARCH -->
    <input id="searchInput"
      placeholder="Search..."
      class="w-full p-3 mt-4 bg-gray-900 border border-gray-700 rounded-lg">

    <!-- POSTS -->
    <div id="posts" class="mt-4 space-y-4"></div>

  </div>
</div>

<!-- 📱 MOBILE NAV -->
<div class="fixed bottom-0 left-0 w-full bg-black border-t border-gray-800 flex justify-around py-2 md:hidden z-50">

  <button onclick="showHome()">🏠</button>
  <button onclick="showNotifications()">🔔</button>
  <button onclick="showExplore()">🔍</button>
  <button onclick="showAbout()">📄</button>

</div>

<!-- Activate Ads -->
<script>
  (adsbygoogle = window.adsbygoogle || []).push({});
</script>

<script type="module" src="script.js"></script>

</body>
</html>
