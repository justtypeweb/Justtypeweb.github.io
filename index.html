<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JustTypeWeb</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<div class="flex max-w-6xl mx-auto">

  <!-- Sidebar -->
  <div class="hidden md:block w-1/4 p-4 border-r border-gray-800">
    <h1 class="text-2xl font-bold mb-6">JustTypeWeb</h1>

    <div class="space-y-4 text-lg">
      <div class="hover:text-blue-400 cursor-pointer">🏠 Home</div>
      <div class="hover:text-blue-400 cursor-pointer">🔔 Notifications</div>
      <div class="hover:text-blue-400 cursor-pointer">🔍 Explore</div>
    </div>
  </div>

  <!-- Main Feed -->
  <div class="w-full md:w-2/4 border-r border-gray-800">

    <div class="p-4 border-b border-gray-800 sticky top-0 bg-black z-10">
      <h2 class="text-xl font-bold">Home</h2>
    </div>

    <!-- Post Box -->
    <div class="p-4 border-b border-gray-800">
      <input id="username" placeholder="Username"
        class="w-full p-2 mb-2 text-black rounded">

      <textarea id="postInput" placeholder="What's happening?"
        class="w-full p-2 text-black rounded"></textarea>

      <button onclick="addPost()"
        class="bg-blue-500 px-4 py-2 mt-2 rounded w-full">
        Post
      </button>
    </div>

    <!-- Search -->
    <div class="p-4 border-b border-gray-800">
      <input id="searchInput"
        placeholder="Search..."
        class="w-full p-2 text-black rounded">
    </div>

    <!-- Posts -->
    <div id="posts"></div>

  </div>

  <!-- Right Panel -->
  <div class="hidden md:block w-1/4 p-4">

    <!-- Notifications -->
    <div class="bg-gray-900 p-3 rounded mb-4">
      <h2 class="font-bold mb-2">Notifications 🔔</h2>
      <div id="notifications" class="text-sm space-y-2"></div>
    </div>

  </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
