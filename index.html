<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JustTypeWeb</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<div class="md:flex">

  <!-- SIDEBAR -->
  <div class="hidden md:flex w-16 min-h-screen border-r border-gray-800 flex-col items-center py-4 gap-4">
    <button onclick="showHome()" class="p-3 bg-gray-900 rounded-lg">🏠</button>
    <button onclick="showNotifications()" class="p-3 bg-gray-900 rounded-lg">🔔</button>
    <button onclick="showExplore()" class="p-3 bg-gray-900 rounded-lg">🔍</button>
    <button onclick="showAbout()" class="p-3 bg-gray-900 rounded-lg">📄</button>
  </div>

  <!-- MAIN -->
  <div class="w-full md:max-w-2xl md:mx-auto px-3 pb-32">

    <!-- HEADER -->
    <div class="sticky top-0 bg-black z-50 border-b border-gray-800 py-3 text-center">
      <h1 class="text-blue-400 font-bold text-lg">JustTypeWeb</h1>
    </div>

    <!-- POST BOX -->
    <div class="bg-gray-900 p-4 rounded-xl mt-4">

      <input id="username"
        placeholder="Username"
        class="w-full p-3 mb-2 bg-black border border-gray-700 rounded-lg">

      <p id="userTagDisplay"
        class="text-xs text-gray-400 mb-3"></p>

      <textarea id="postInput"
        placeholder="What's happening?"
        class="w-full p-3 bg-black border border-gray-700 rounded-lg h-24"></textarea>

      <button onclick="addPost()"
        class="bg-blue-500 mt-3 w-full py-3 rounded-lg font-bold">
        Post
      </button>

    </div>

    <!-- SEARCH -->
    <input id="searchInput"
      placeholder="Search posts..."
      onkeyup="searchPosts()"
      class="w-full p-3 mt-4 bg-gray-900 border border-gray-700 rounded-lg">

    <!-- POSTS -->
    <div id="posts" class="mt-4 space-y-4"></div>

  </div>
</div>

<!-- MOBILE NAV -->
<div class="fixed bottom-0 left-0 w-full bg-black border-t border-gray-800 flex justify-around py-2 md:hidden z-50">

  <button onclick="showHome()">🏠</button>
  <button onclick="showNotifications()">🔔</button>
  <button onclick="showExplore()">🔍</button>
  <button onclick="showAbout()">📄</button>

</div>

<script>

let posts = JSON.parse(localStorage.getItem("posts")) || [];

const usernameInput = document.getElementById("username");
const tagDisplay = document.getElementById("userTagDisplay");

usernameInput.addEventListener("input", () => {

  let username = usernameInput.value.trim();

  if(username.length > 0){

    let tag = "#" + Math.floor(1000 + Math.random() * 9000);

    tagDisplay.innerText = username + tag;

  } else {

    tagDisplay.innerText = "";

  }

});

function savePosts(){

  localStorage.setItem("posts", JSON.stringify(posts));

}

function renderPosts(filteredPosts = posts){

  const postsDiv = document.getElementById("posts");

  postsDiv.innerHTML = "";

  [...filteredPosts].reverse().forEach((post, index) => {

    postsDiv.innerHTML += `

      <div class="bg-gray-900 p-4 rounded-xl">

        <div class="flex items-center justify-between">

          <div>
            <h2 class="font-bold text-blue-400">
              ${post.username}
            </h2>

            <p class="text-xs text-gray-400">
              ${post.tag}
            </p>
          </div>

          <p class="text-xs text-gray-500">
            ${post.time}
          </p>

        </div>

        <p class="mt-3 break-words">
          ${post.text}
        </p>

        <div class="flex gap-4 mt-4">

          <button onclick="likePost(${posts.indexOf(post)})">
            ❤️ ${post.likes}
          </button>

        </div>

      </div>

    `;

  });

}

function addPost(){

  const username = usernameInput.value.trim();
  const text = document.getElementById("postInput").value.trim();

  if(username === "" || text === ""){

    alert("Enter username and post");

    return;

  }

  let tag = "#" + Math.floor(1000 + Math.random() * 9000);

  const post = {

    username: username,
    tag: tag,
    text: text,
    likes: 0,
    time: new Date().toLocaleString()

  };

  posts.push(post);

  savePosts();

  renderPosts();

  document.getElementById("postInput").value = "";

}

function likePost(index){

  posts[index].likes++;

  savePosts();

  renderPosts();

}

function searchPosts(){

  const value = document.getElementById("searchInput")
    .value
    .toLowerCase();

  const filtered = posts.filter(post =>

    post.text.toLowerCase().includes(value) ||
    post.username.toLowerCase().includes(value)

  );

  renderPosts(filtered);

}

function showHome(){

  alert("Home Page");

}

function showNotifications(){

  alert("Notifications Coming Soon");

}

function showExplore(){

  alert("Explore Page Coming Soon");

}

function showAbout(){

  alert("JustTypeWeb Social Platform");

}

renderPosts();

</script>

</body>
</html>
