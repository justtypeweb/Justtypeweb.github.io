<!DOCTYPE html>
<html>
<head>

<title>JustTypeWeb</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

</head>

<body>

<header>

<h1 class="logo">JustTypeWeb</h1>

<button id="loginBtn">Login with Google</button>

</header>

<div class="container">

<div id="usernameBox" class="username-box" style="display:none">

<h3>Create Username</h3>

<input id="usernameInput" placeholder="Unique username">

<button id="saveUsername">Save</button>

</div>


<div class="post-box">

<textarea id="postText" placeholder="Write something..."></textarea>

<button id="postBtn">Post</button>

</div>


<h2>Latest Posts</h2>

<div id="posts"></div>


<div class="donate">

<h3>Support Developer ❤️</h3>

<script src="https://checkout.razorpay.com/v1/payment-button.js"
data-payment_button_id="rzp_live_SRA29FyRhArgmI"
async>
</script>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
