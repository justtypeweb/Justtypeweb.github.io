<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JustTypeWeb</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen">

<div class="max-w-xl mx-auto p-4 min-h-screen">

  <!-- Header -->
  <h1 class="text-3xl font-bold text-center mb-6">
    JustTypeWeb
  </h1>

  <!-- Username -->
  <input 
    id="username"
    type="text"
    placeholder="Enter your username"
    class="w-full p-3 mb-3 rounded text-black outline-none"
  />

  <!-- Post Box -->
  <textarea 
    id="postInput"
    placeholder="What's happening?"
    class="w-full p-3 rounded text-black h-24 outline-none resize-none"
  ></textarea>

  <!-- Post Button -->
  <button 
    onclick="addPost()"
    class="bg-blue-500 hover:bg-blue-600 w-full p-3 mt-3 rounded font-bold transition"
  >
    Post
  </button>

  <!-- Divider -->
  <hr class="my-6 border-gray-700">

  <!-- Posts Section -->
  <div id="posts" class="space-y-2"></div>

</div>

<!-- IMPORTANT: Must be module -->
<script type="module" src="script.js"></script>

</body>
</html>
