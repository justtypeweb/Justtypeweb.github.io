<body class="bg-[#CBDDE9] text-black">

<!-- Navbar -->
<div class="fixed top-0 w-full bg-[#2872A1] text-white border-b border-gray-300 p-4 text-center font-bold text-lg z-10">
  JustTypeWeb
</div>

<!-- Layout -->
<div class="flex justify-center mt-20">

  <!-- Feed -->
  <div class="w-full max-w-xl bg-white border-x border-gray-300 min-h-screen p-4">

    <!-- Post Box -->
    <div class="border-b border-gray-300 pb-4 mb-4">

      <input id="username"
        type="text"
        placeholder="Username"
        class="w-full p-2 mb-2 rounded border border-gray-300" />

      <textarea id="postInput"
        placeholder="What's happening?"
        class="w-full p-3 rounded border border-gray-300 h-24"></textarea>

      <button onclick="addPost()"
        class="bg-[#2872A1] hover:opacity-90 text-white px-4 py-2 mt-2 rounded float-right">
        Post
      </button>

      <div class="clear-both"></div>
    </div>

    <!-- Posts -->
    <div id="posts" class="space-y-2"></div>

  </div>

</div>

<script type="module" src="script.js"></script>

</body>
