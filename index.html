<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JustTypeWeb</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen">

<div class="max-w-xl mx-auto p-4">

  <!-- Header -->
  <h1 class="text-3xl font-bold text-center mb-6">
    JustTypeWeb
  </h1>

  <!-- Username -->
  <input id="username"
    type="text"
    placeholder="Enter your username"
    class="w-full p-3 mb-3 rounded text-black" />

  <!-- Post Box -->
  <textarea id="postInput"
    placeholder="What's happening?"
    class="w-full p-3 rounded text-black h-24"></textarea>

  <!-- Post Button -->
  <button onclick="addPost()"
    class="bg-blue-500 hover:bg-blue-600 w-full p-3 mt-3 rounded font-bold">
    Post
  </button>

  <!-- Posts Section -->
  <div id="posts" class="mt-6 space-y-4"></div>

</div>

<script src="script.js"></script>

</body>
</html>
