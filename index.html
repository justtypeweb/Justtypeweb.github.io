<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JustTypeWeb</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="flex max-w-6xl mx-auto">

  <!-- Sidebar -->
  <div class="hidden md:block w-1/4 p-4 sidebar">
    <h1 class="logo">JustTypeWeb</h1>

    <div class="menu">
      <div onclick="showHome()">🏠 Home</div>
      <div onclick="showNotifications()">🔔 Notifications</div>
      <div onclick="showExplore()">🔍 Explore</div>
    </div>
  </div>

  <!-- Main -->
  <div class="w-full md:w-2/4 p-4">

    <!-- HOME -->
    <div id="homeSection">

      <input id="username" placeholder="Username" />
      <textarea id="postInput" placeholder="What's happening?"></textarea>

      <button onclick="addPost()">Post</button>

      <input id="searchInput" placeholder="Search..." />

      <div id="posts"></div>

    </div>

    <!-- Notifications -->
    <div id="notificationSection" class="hidden">
      <h2 class="title">Notifications 🔔</h2>
      <div id="notifications"></div>
    </div>

    <!-- Explore -->
    <div id="exploreSection" class="hidden">
      <h2 class="title">Explore 🔍</h2>
      <div id="explorePosts"></div>
    </div>

  </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
