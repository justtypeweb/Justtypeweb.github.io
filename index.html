<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JustTypeWeb</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ✅ Google AdSense -->
  <script async 
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9966062812451377"
    crossorigin="anonymous"></script>
</head>

<body class="bg-black text-white">

<!-- 🔝 MOBILE HEADER -->
<div class="md:hidden fixed top-0 left-0 w-full bg-black border-b border-gray-700 p-3 text-center z-50">
  <h1 class="text-lg font-bold text-blue-400">JustTypeWeb</h1>
</div>

<div class="flex max-w-6xl mx-auto mt-14 md:mt-0">

  <!-- Sidebar -->
  <div class="hidden md:block w-1/4 p-4 border-r border-gray-700">
    <h1 class="text-2xl font-bold mb-6 text-blue-400">JustTypeWeb</h1>

    <div class="space-y-4">
      <div onclick="showHome()" class="cursor-pointer hover:text-blue-400">🏠 Home</div>
      <div onclick="showNotifications()" class="cursor-pointer hover:text-blue-400">🔔 Notifications</div>
      <div onclick="showExplore()" class="cursor-pointer hover:text-blue-400">🔍 Explore</div>
      <div onclick="showAbout()" class="cursor-pointer hover:text-blue-400">📄 About</div>
    </div>
  </div>

  <!-- Main -->
  <div class="w-full md:w-2/4 p-4 pb-24">

    <!-- 🔝 TOP AD -->
    <div class="my-4 text-center">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-9966062812451377"
           data-ad-slot="1234567890"
           data-ad-format="auto"></ins>
    </div>

    <!-- HOME -->
    <div id="homeSection">

      <input id="username" placeholder="Username"
        class="w-full p-3 mb-3 bg-gray-900 border border-gray-700 rounded-lg">

      <textarea id="postInput" placeholder="What's happening?"
        class="w-full p-3 bg-gray-900 border border-gray-700 rounded-lg h-24"></textarea>

      <button onclick="addPost()"
        class="bg-blue-500 hover:bg-blue-600 px-4 py-3 mt-3 rounded-lg w-full font-bold">
        Post
      </button>

      <input id="searchInput"
        placeholder="Search..."
        class="w-full p-3 mt-4 bg-gray-900 border border-gray-700 rounded-lg">

      <div id="posts" class="mt-6 space-y-4"></div>

    </div>

    <!-- NOTIFICATIONS -->
    <div id="notificationSection" class="hidden">
      <h2 class="text-xl mb-3 text-blue-400">Notifications 🔔</h2>
      <div id="notifications"></div>
    </div>

    <!-- EXPLORE -->
    <div id="exploreSection" class="hidden">
      <h2 class="text-xl mb-3 text-blue-400">Explore 🔍</h2>
      <div id="explorePosts"></div>
    </div>

    <!-- ABOUT -->
    <div id="aboutSection" class="hidden">
      <h2 class="text-xl mb-3 text-blue-400">About 📄</h2>
      <p class="text-gray-300">
        JustTypeWeb is a modern social platform where users can share thoughts instantly.
      </p>
    </div>

  </div>

</div>

<!-- 📱 MOBILE NAV -->
<div class="fixed bottom-0 left-0 w-full bg-black border-t border-gray-700 flex justify-around p-3 md:hidden text-lg">
  <div onclick="showHome()">🏠</div>
  <div onclick="showNotifications()">🔔</div>
  <div onclick="showExplore()">🔍</div>
  <div onclick="showAbout()">📄</div>
</div>

<!-- ✅ ACTIVATE ADS -->
<script>
  (adsbygoogle = window.adsbygoogle || []).push({});
</script>

<script type="module" src="script.js"></script>

</body>
</html>
